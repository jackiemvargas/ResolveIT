<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResolveIT Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <div>
                <h1>ResolveIT</h1>
                <p class="subtitle">Smart IT Support Ticket Dashboard</p>
            </div>
            <div class="hero-box">
                <p class="hero-label">Demo System</p>
                <h3>Small Business IT Support</h3>
                <p>Track, assign, and resolve technical issues faster.</p>
            </div>
        </header>

        <main class="dashboard">
            <section class="panel form-panel">
                <h2>Submit a Ticket</h2>
                <form id="ticketForm">
                    <label for="name">Employee Name</label>
                    <input type="text" id="name" placeholder="Enter employee name" required>

                    <label for="department">Department</label>
                    <input type="text" id="department" placeholder="Example: Sales" required>

                    <label for="category">Issue Category</label>
                    <select id="category" required>
                        <option value="Password Reset">Password Reset</option>
                        <option value="Printer Issue">Printer Issue</option>
                        <option value="Network Problem">Network Problem</option>
                        <option value="Software Issue">Software Issue</option>
                        <option value="Device Setup">Device Setup</option>
                    </select>

                    <label for="priority">Priority</label>
                    <select id="priority" required>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>

                    <label for="technician">Assign Technician</label>
                    <select id="technician" required>
                        <option value="Parker">Parker</option>
                        <option value="Justin">Justin</option>
                        <option value="Penelope">Penelope</option>
                        <option value="Leila">Leila</option>
                    </select>

                    <label for="description">Issue Description</label>
                    <textarea id="description" placeholder="Describe the issue" required></textarea>

                    <button type="submit">Submit Ticket</button>
                </form>
            </section>

            <section class="panel tickets-panel">
                <div class="tickets-header">
                    <div>
                        <h2>Tickets</h2>
                        <p class="section-note">Monitor support requests in one place.</p>
                    </div>

                    <div class="filters">
                        <select id="statusFilter">
                            <option value="All">All Statuses</option>
                            <option value="Open">Open</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Resolved">Resolved</option>
                        </select>

                        <select id="priorityFilter">
                            <option value="All">All Priorities</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <h3 id="totalTickets">0</h3>
                        <p>Total Tickets</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="openTickets">0</h3>
                        <p>Open</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="resolvedTickets">0</h3>
                        <p>Resolved</p>
                    </div>
                </div>

                <div id="ticketList" class="ticket-grid"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
